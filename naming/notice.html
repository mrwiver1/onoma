<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공지사항 — 힐링네임 by ONOMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
  :root {
    --ink:#1a140a;--ink2:#3a2e1e;--ink3:#6b5a3e;--ink-faint:#b0a08a;
    --gold:#c4a24a;--gold-dark:#8a6a1f;--green-dark:#4a6b42;
    --bg:#f5f0e8;--bg2:#ede8de;
    --serif:'Cormorant Garamond','Noto Serif KR',serif;
    --sans:'Noto Sans KR',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);}

  .board-hero{padding:56px 5% 40px;border-bottom:1px solid rgba(196,162,74,0.15);}
  .board-hero-inner{max-width:860px;margin:0 auto;}
  .board-eyebrow{font-size:10px;letter-spacing:0.2em;color:var(--gold-dark);text-transform:uppercase;margin-bottom:12px;}
  .board-title{font-family:var(--serif);font-size:clamp(24px,3vw,36px);font-weight:300;color:var(--ink);margin-bottom:8px;}
  .board-sub{font-size:13px;color:var(--ink3);}

  .board-wrap{max-width:860px;margin:0 auto;padding:40px 5% 80px;}

  /* 목록 */
  .notice-list{border-top:2px solid var(--ink);}
  .notice-item{
    display:grid;grid-template-columns:1fr auto;
    align-items:center;gap:16px;
    padding:18px 0;
    border-bottom:1px solid rgba(196,162,74,0.15);
    cursor:pointer;transition:background 0.15s;
  }
  .notice-item:hover{background:rgba(196,162,74,0.04);}
  .notice-item.pinned .notice-item-title::before{
    content:'공지';display:inline-block;
    background:var(--green-dark);color:#fff;
    font-size:10px;padding:2px 8px;margin-right:8px;
    letter-spacing:0.05em;vertical-align:middle;
  }
  .notice-item-title{font-size:14px;color:var(--ink);font-weight:500;line-height:1.6;}
  .notice-item-date{font-size:12px;color:var(--ink-faint);white-space:nowrap;}

  /* 상세 */
  .notice-detail{display:none;border-bottom:1px solid rgba(196,162,74,0.15);padding:24px 0;}
  .notice-detail.open{display:block;}
  .notice-detail-content{
    font-size:14px;color:var(--ink2);line-height:1.9;
    background:#fff;border:1px solid rgba(196,162,74,0.15);
    padding:24px;white-space:pre-wrap;
  }
  .notice-detail-close{
    display:inline-block;margin-top:14px;font-size:12px;
    color:var(--gold-dark);cursor:pointer;letter-spacing:0.05em;
  }

  .empty-msg{text-align:center;padding:60px 0;color:var(--ink-faint);font-size:13px;letter-spacing:0.1em;}
  .loading-msg{text-align:center;padding:40px 0;color:var(--ink-faint);font-size:12px;}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html" style="display:flex;flex-direction:column;gap:2px;line-height:1;text-decoration:none;">
    <span style="font-family:var(--serif);font-size:18px;color:var(--ink);letter-spacing:0.05em;">힐링네임</span>
    <span style="font-size:9px;letter-spacing:0.2em;color:var(--gold-dark);text-transform:uppercase;">by ONOMA</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">서비스 안내</a></li>
    <li><a href="faq.html">FAQ</a></li>
    <li><a href="review.html">고객 리뷰</a></li>
    <li><a href="qna.html">질문과 답변</a></li>
  </ul>
  <button class="nav-cta" onclick="location.href='form.html'">작명 신청하기</button>
</nav>

<!-- HERO -->
<section class="board-hero">
  <div class="board-hero-inner">
    <div class="board-eyebrow">Notice</div>
    <h1 class="board-title">공지사항</h1>
    <p class="board-sub">힐링네임 서비스 관련 안내 및 공지입니다</p>
  </div>
</section>

<!-- 목록 -->
<div class="board-wrap">
  <div class="notice-list" id="noticeList">
    <div class="loading-msg">불러오는 중…</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wavhcknviozwadqyjlug.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indhdmhja252aW96d2FkcXlqbHVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTQ5NjksImV4cCI6MjA5MDQzMDk2OX0.frq_z3GgL8BEjHCRuVcdOqPLe0DhJp0k-joOXYVK_Ws';

async function loadNotices() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/notices?is_published=eq.true&order=is_pinned.desc,created_at.desc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    const data = await res.json();
    renderNotices(data);
  } catch(e) {
    document.getElementById('noticeList').innerHTML = '<div class="empty-msg">데이터를 불러올 수 없습니다</div>';
  }
}

function renderNotices(list) {
  const el = document.getElementById('noticeList');
  if (!list || list.length === 0) {
    el.innerHTML = '<div class="empty-msg">등록된 공지사항이 없습니다</div>';
    return;
  }
  el.innerHTML = list.map((n, i) => `
    <div class="notice-item ${n.is_pinned ? 'pinned' : ''}" onclick="toggleDetail(${i})">
      <div class="notice-item-title">${n.title}</div>
      <div class="notice-item-date">${n.created_at.slice(0,10)}</div>
    </div>
    <div class="notice-detail" id="detail-${i}">
      <div class="notice-detail-content">${n.content}</div>
      <span class="notice-detail-close" onclick="toggleDetail(${i})">▲ 닫기</span>
    </div>
  `).join('');
}

function toggleDetail(i) {
  const d = document.getElementById('detail-' + i);
  d.classList.toggle('open');
}

loadNotices();
</script>
</body>
</html>
