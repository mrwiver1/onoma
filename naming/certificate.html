<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작명장 발급 — 오노마 상담소</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --ink: #1a140a;
    --ink2: #3a2e1e;
    --ink3: #6b5a3e;
    --gold: #c4a24a;
    --gold-dark: #8a6a1f;
    --green-dark: #4a6b42;
    --bg: #f5f0e8;
    --bg2: #ede8de;
    --serif: 'Cormorant Garamond', 'Noto Serif KR', serif;
    --sans: 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--ink); }

  .admin-layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: 100vh;
  }

  /* 입력 패널 */
  .input-panel {
    background: #fff;
    border-right: 1px solid rgba(196,162,74,0.2);
    padding: 32px 24px;
    overflow-y: auto;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .panel-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .panel-sub {
    font-size: 12px;
    color: var(--ink3);
    margin-bottom: 28px;
    line-height: 1.7;
  }
  .field-group {
    margin-bottom: 18px;
  }
  .field-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink2);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  .field-group input,
  .field-group select,
  .field-group textarea {
    width: 100%;
    border: 1px solid rgba(196,162,74,0.3);
    background: var(--bg);
    padding: 10px 14px;
    font-size: 14px;
    font-family: var(--sans);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .field-group input:focus,
  .field-group select:focus,
  .field-group textarea:focus {
    border-color: var(--green-dark);
    background: #fff;
  }
  .field-group textarea { min-height: 70px; resize: vertical; line-height: 1.7; }
  .field-divider {
    border: none;
    border-top: 1px dashed rgba(196,162,74,0.3);
    margin: 20px 0;
  }
  .field-label-section {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-dark);
    font-weight: 600;
    margin-bottom: 14px;
  }

  /* 스타일 선택 */
  .style-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 18px;
  }
  .style-btn {
    border: 1.5px solid rgba(196,162,74,0.25);
    padding: 10px 6px;
    cursor: pointer;
    text-align: center;
    font-size: 11px;
    color: var(--ink3);
    background: var(--bg);
    transition: all 0.2s;
    font-family: var(--sans);
  }
  .style-btn.active {
    border-color: var(--green-dark);
    background: rgba(74,107,66,0.08);
    color: var(--green-dark);
    font-weight: 600;
  }

  /* 버튼 */
  .btn-generate {
    width: 100%;
    background: var(--green-dark);
    color: #fff;
    border: none;
    padding: 14px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    transition: background 0.2s;
  }
  .btn-generate:hover { background: #3a6333; }
  .btn-download {
    width: 100%;
    background: var(--ink);
    color: #fff;
    border: none;
    padding: 14px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: background 0.2s;
  }
  .btn-download:hover { background: #2a1e10; }

  /* 미리보기 패널 */
  .preview-panel {
    background: #e8e0d0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    min-height: 100vh;
  }
  .preview-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--ink3);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* 작명장 본체 */
  .certificate {
    width: 680px;
    background: #faf6ef;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  /* 스타일 1: 클래식 */
  .cert-classic {
    padding: 60px 70px;
    border: 12px solid transparent;
    background-clip: padding-box;
    position: relative;
  }
  .cert-classic::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1.5px solid rgba(196,162,74,0.4);
    pointer-events: none;
  }
  .cert-classic::after {
    content: '';
    position: absolute;
    inset: 12px;
    border: 0.5px solid rgba(196,162,74,0.2);
    pointer-events: none;
  }

  /* 스타일 2: 모던 */
  .cert-modern {
    padding: 0;
  }
  .cert-modern .cert-top-bar {
    background: var(--green-dark);
    height: 8px;
    width: 100%;
  }
  .cert-modern .cert-body { padding: 50px 60px; }
  .cert-modern .cert-bottom-bar {
    background: var(--green-dark);
    height: 4px;
    width: 100%;
  }

  /* 스타일 3: 우아한 */
  .cert-elegant {
    padding: 50px 60px;
    background: linear-gradient(135deg, #faf6ef 0%, #f5ede0 100%);
  }

  /* 공통 내부 요소 */
  .cert-watermark {
    font-family: var(--serif);
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(196,162,74,0.6);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 30px;
  }
  .cert-main-title {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 300;
    color: var(--gold-dark);
    text-align: center;
    letter-spacing: 0.3em;
    margin-bottom: 36px;
    text-transform: uppercase;
  }
  .cert-name-area {
    text-align: center;
    margin-bottom: 28px;
    position: relative;
  }
  .cert-name-kr {
    font-family: var(--serif);
    font-size: 64px;
    font-weight: 300;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 12px;
    letter-spacing: 0.15em;
  }
  .cert-name-hanja {
    font-size: 24px;
    color: var(--ink3);
    letter-spacing: 0.4em;
    margin-bottom: 8px;
  }
  .cert-name-reading {
    font-size: 13px;
    color: var(--ink3);
    letter-spacing: 0.2em;
  }
  .cert-divider-ornament {
    text-align: center;
    margin: 24px 0;
    color: var(--gold);
    font-size: 18px;
    letter-spacing: 8px;
  }
  .cert-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 28px;
  }
  .cert-info-item {
    border-bottom: 1px solid rgba(196,162,74,0.2);
    padding-bottom: 10px;
  }
  .cert-info-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gold-dark);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .cert-info-value {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--ink);
  }
  .cert-meaning {
    background: rgba(196,162,74,0.06);
    border-left: 2px solid var(--gold);
    padding: 16px 20px;
    margin-bottom: 28px;
  }
  .cert-meaning-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gold-dark);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .cert-meaning-text {
    font-family: var(--serif);
    font-size: 14px;
    font-style: italic;
    color: var(--ink2);
    line-height: 1.8;
  }
  .cert-footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid rgba(196,162,74,0.2);
  }
  .cert-date-area {
    font-size: 12px;
    color: var(--ink3);
    line-height: 1.9;
  }
  .cert-brand-area {
    text-align: right;
  }
  .cert-brand-main {
    font-family: var(--serif);
    font-size: 16px;
    color: var(--ink);
    font-weight: 400;
    margin-bottom: 4px;
  }
  .cert-brand-sub {
    font-size: 11px;
    color: var(--ink3);
    letter-spacing: 0.08em;
  }
  .cert-stamp {
    width: 64px;
    height: 64px;
    border: 2.5px solid #c0392b;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #c0392b;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    transform: rotate(-12deg);
    margin-left: 16px;
    flex-shrink: 0;
    line-height: 1.3;
    text-align: center;
    font-family: var(--sans);
  }

  .cert-footer-right {
    display: flex;
    align-items: flex-end;
    gap: 0;
  }

  /* 배경 장식 */
  .cert-bg-ornament {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 1px solid rgba(196,162,74,0.06);
    pointer-events: none;
  }
  .cert-bg-ornament2 {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
    height: 400px;
    border-radius: 50%;
    border: 1px solid rgba(196,162,74,0.04);
    pointer-events: none;
  }

  @media (max-width: 1100px) {
    .admin-layout { grid-template-columns: 1fr; }
    .input-panel { position: static; height: auto; }
    .certificate { width: 100%; max-width: 680px; }
  }
</style>
</head>
<body>

<div class="admin-layout">

  <!-- 입력 패널 -->
  <div class="input-panel">
    <div class="panel-title">작명장 발급</div>
    <p class="panel-sub">정보를 입력하고 미리보기를 확인한 후<br>PDF로 다운로드하세요.</p>

    <div class="field-label-section">스타일 선택</div>
    <div class="style-grid">
      <button class="style-btn active" onclick="setStyle('classic', this)">클래식</button>
      <button class="style-btn" onclick="setStyle('modern', this)">모던</button>
      <button class="style-btn" onclick="setStyle('elegant', this)">우아한</button>
    </div>

    <hr class="field-divider">
    <div class="field-label-section">이름 정보</div>

    <div class="field-group">
      <label>이름 (한글) *</label>
      <input type="text" id="name-kr" placeholder="예: 김하늘" value="김하늘" oninput="updateCert()">
    </div>
    <div class="field-group">
      <label>이름 (한자)</label>
      <input type="text" id="name-hanja" placeholder="예: 金 河 늘" value="金 河 늘" oninput="updateCert()">
    </div>
    <div class="field-group">
      <label>한자 독음 (음훈)</label>
      <input type="text" id="name-reading" placeholder="예: 쇠 금, 물 하, 하늘 늘" oninput="updateCert()">
    </div>
    <div class="field-group">
      <label>이름 뜻 / 해설</label>
      <textarea id="name-meaning" placeholder="예: 하늘처럼 넓은 마음으로 세상을 품는 이름. 金은 굳건함, 河는 넉넉한 흐름을 의미합니다." oninput="updateCert()"></textarea>
    </div>

    <hr class="field-divider">
    <div class="field-label-section">인적 사항</div>

    <div class="field-group">
      <label>생년월일</label>
      <input type="text" id="birthdate" placeholder="예: 2024년 3월 15일" oninput="updateCert()">
    </div>
    <div class="field-group">
      <label>성별</label>
      <select id="gender" onchange="updateCert()">
        <option value="여">여</option>
        <option value="남">남</option>
      </select>
    </div>
    <div class="field-group">
      <label>작명 일자</label>
      <input type="text" id="issue-date" oninput="updateCert()">
    </div>

    <hr class="field-divider">
    <div class="field-label-section">발급 정보</div>

    <div class="field-group">
      <label>발급 번호 (선택)</label>
      <input type="text" id="cert-num" placeholder="예: 2024-0315-001" oninput="updateCert()">
    </div>

    <hr class="field-divider">

    <button class="btn-generate" onclick="updateCert()">미리보기 새로고침</button>
    <button class="btn-download" onclick="downloadCert()">PDF 다운로드</button>
  </div>

  <!-- 미리보기 패널 -->
  <div class="preview-panel">
    <div class="preview-label">작명장 미리보기</div>
    <div class="certificate" id="certificate">
      <!-- 배경 장식 -->
      <div class="cert-bg-ornament"></div>
      <div class="cert-bg-ornament2"></div>

      <div class="cert-classic" id="cert-inner">
        <div class="cert-watermark">NAMING CERTIFICATE · 이지윤의 힐링네임</div>
        <div class="cert-main-title">작 명 장</div>

        <div class="cert-name-area">
          <div class="cert-name-kr" id="cert-name-kr">김하늘</div>
          <div class="cert-name-hanja" id="cert-name-hanja">金 河 늘</div>
          <div class="cert-name-reading" id="cert-name-reading"></div>
        </div>

        <div class="cert-divider-ornament">◈ ◈ ◈</div>

        <div class="cert-info-grid">
          <div class="cert-info-item">
            <div class="cert-info-label">생년월일</div>
            <div class="cert-info-value" id="cert-birthdate">2024년 3월 15일</div>
          </div>
          <div class="cert-info-item">
            <div class="cert-info-label">성별</div>
            <div class="cert-info-value" id="cert-gender">여</div>
          </div>
          <div class="cert-info-item">
            <div class="cert-info-label">작명 일자</div>
            <div class="cert-info-value" id="cert-issue-date"></div>
          </div>
          <div class="cert-info-item" id="cert-num-area">
            <div class="cert-info-label">발급 번호</div>
            <div class="cert-info-value" id="cert-num-display"></div>
          </div>
        </div>

        <div class="cert-meaning" id="cert-meaning-area" style="display:none;">
          <div class="cert-meaning-label">이름의 뜻</div>
          <div class="cert-meaning-text" id="cert-meaning-text"></div>
        </div>

        <div class="cert-footer">
          <div class="cert-date-area">
            위 이름을 삶의 흐름과 이름의 구조를<br>
            함께 분석하여 작명하였음을 증명합니다.
          </div>
          <div class="cert-footer-right">
            <div class="cert-brand-area">
              <div class="cert-brand-main">이지윤의 힐링네임</div>
              <div class="cert-brand-sub">오노마 상담소 · 원장 이지윤</div>
            </div>
            <div class="cert-stamp">원장<br>이지윤</div>
          </div>
        </div>
      </div>
    </div>

    <div style="margin-top:20px;font-size:11px;color:var(--ink3);text-align:center;line-height:1.8;">
      ※ 실제 인쇄 시 A4 기준 출력을 권장합니다<br>
      ※ 고급 실물 작명장은 별도 제작·발송됩니다
    </div>
  </div>

</div>

<script>
// 오늘 날짜 기본값
const today = new Date();
const todayStr = `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일`;
document.getElementById('issue-date').value = todayStr;

let currentStyle = 'classic';

function setStyle(style, btn) {
  currentStyle = style;
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateCert();
}

function updateCert() {
  // 이름 업데이트
  document.getElementById('cert-name-kr').textContent = document.getElementById('name-kr').value || '이름';
  document.getElementById('cert-name-hanja').textContent = document.getElementById('name-hanja').value || '';
  document.getElementById('cert-name-reading').textContent = document.getElementById('name-reading').value || '';
  document.getElementById('cert-birthdate').textContent = document.getElementById('birthdate').value || '—';
  document.getElementById('cert-gender').textContent = document.getElementById('gender').value || '—';
  document.getElementById('cert-issue-date').textContent = document.getElementById('issue-date').value || todayStr;

  // 뜻 영역
  const meaning = document.getElementById('name-meaning').value;
  const meaningArea = document.getElementById('cert-meaning-area');
  if (meaning) {
    meaningArea.style.display = 'block';
    document.getElementById('cert-meaning-text').textContent = meaning;
  } else {
    meaningArea.style.display = 'none';
  }

  // 발급 번호
  const certNum = document.getElementById('cert-num').value;
  const numArea = document.getElementById('cert-num-area');
  if (certNum) {
    numArea.style.display = 'block';
    document.getElementById('cert-num-display').textContent = certNum;
  } else {
    numArea.style.display = 'none';
  }

  // 스타일 적용
  const inner = document.getElementById('cert-inner');
  inner.className = `cert-${currentStyle}`;
  if (currentStyle === 'modern') {
    const cert = document.getElementById('certificate');
    if (!cert.querySelector('.cert-top-bar')) {
      const top = document.createElement('div');
      top.className = 'cert-top-bar';
      const bot = document.createElement('div');
      bot.className = 'cert-bottom-bar';
      cert.insertBefore(top, cert.firstChild);
      cert.appendChild(bot);
    }
  }
}

function downloadCert() {
  const cert = document.getElementById('certificate');
  html2canvas(cert, {
    scale: 3,
    useCORS: true,
    backgroundColor: '#faf6ef'
  }).then(canvas => {
    const link = document.createElement('a');
    const name = document.getElementById('name-kr').value || '작명장';
    link.download = `작명장_${name}_${document.getElementById('issue-date').value.replace(/년|월|일| /g,'')}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}

updateCert();
</script>
</body>
</html>
